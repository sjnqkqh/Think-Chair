{% extends "base.html" %}
{% block title %}로그인 - Think Chair{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-[#fafaf9]"
     x-data="{
       login_id: '', password: '', error: '',
       async submit() {
         this.error = '';
         const res = await fetch('/api/auth/login', {
           method: 'POST',
           headers: { 'Content-Type': 'application/json' },
           body: JSON.stringify({ login_id: this.login_id, password: this.password })
         });
         if (res.ok) { window.location.href = '/workspace'; return; }
         const data = await res.json().catch(() => ({}));
         this.error = data.detail || '로그인에 실패했습니다.';
       }
     }">
  <div class="w-full max-w-[400px] bg-white border border-[#ebeced] rounded-xl p-8 shadow-sm">
    <h1 class="text-2xl font-semibold text-[#37352f] mb-1">로그인</h1>
    <p class="text-sm text-[#787671] mb-6">다시 만나서 반갑습니다.</p>

    <div x-show="error" x-cloak
         class="mb-4 rounded-lg bg-[#fde0ec] border border-[#e03131] text-[#e03131] text-sm px-3 py-2"
         x-text="error"></div>

    <form @submit.prevent="submit" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-[#37352f] mb-1">아이디</label>
        <input type="text" x-model="login_id" required
               class="w-full border border-[#ebeced] rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#d1d5db]" />
      </div>
      <div>
        <label class="block text-sm font-medium text-[#37352f] mb-1">비밀번호</label>
        <input type="password" x-model="password" required
               class="w-full border border-[#ebeced] rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#d1d5db]" />
      </div>
      <button type="submit"
              class="w-full bg-[#e5e7eb] hover:bg-[#d1d5db] text-[#1f1f1f] font-medium rounded-lg py-2.5 text-sm transition-colors">
        로그인
      </button>
    </form>

    <p class="text-sm text-[#787671] mt-6 text-center">
      계정이 없으신가요?
      <a href="/signup" class="text-[#4b5563] font-medium hover:underline">회원가입</a>
    </p>
  </div>
</div>
{% endblock %}
