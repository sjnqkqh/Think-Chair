<button
  x-data
  @click="$dispatch('open-new-manuscript-modal')"
  class="w-full mb-4 rounded-[8px] bg-[#e5e7eb] text-[#1f1f1f] py-2.5 text-sm font-medium hover:bg-[#d1d5db]"
>+ 새 원고</button>
{% for group in manuscript_groups %}
<div class="mb-3">
  <p class="px-2 pb-1 text-sm font-bold text-[#1f1f1f]">{{ group.date }}</p>
  <ul class="space-y-1">
    {% for m in group.manuscripts %}
    <li class="group flex items-center rounded-[6px] {% if active_manuscript and active_manuscript.id == m.id %}bg-[#e5e3df] font-medium{% else %}hover:bg-[#F6F5F4]{% endif %}">
      <a href="/workspace/{{ m.id }}" class="block flex-1 min-w-0 px-2 py-1.5 text-sm">
        <span class="block text-xs text-[#787671]">{{ m.concept.value }}</span>
        {{ m.topic }}
      </a>
      <button
        type="button"
        title="삭제"
        hx-delete="/api/manuscripts/{{ m.id }}"
        hx-swap="none"
        hx-confirm="'{{ m.topic }}' 원고를 삭제하시겠습니까?"
        hx-on::after-request="if(event.detail.successful && {{ 'true' if active_manuscript and active_manuscript.id == m.id else 'false' }}) window.location.href = '/workspace'"
        class="shrink-0 mr-1 px-1.5 py-1 text-xs text-[#9b9891] opacity-0 group-hover:opacity-100 hover:text-red-600"
      >✕</button>
    </li>
    {% endfor %}
  </ul>
</div>
{% if not loop.last %}
<hr class="border-t border-[#e5e3df] mb-3">
{% endif %}
{% endfor %}
