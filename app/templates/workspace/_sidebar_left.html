<button
  x-data
  @click="$dispatch('open-new-manuscript-modal')"
  class="w-full mb-4 rounded-[8px] bg-[#e5e7eb] text-[#1f1f1f] py-2.5 text-sm font-medium hover:bg-[#d1d5db]"
>+ 새 원고</button>
<ul class="space-y-1">
  {% for m in manuscripts %}
  <li>
    <a href="/workspace/{{ m.id }}"
       class="block rounded-[6px] px-2 py-1.5 text-sm {% if active_manuscript and active_manuscript.id == m.id %}bg-[#e5e3df] font-medium{% else %}hover:bg-[#F6F5F4]{% endif %}">
      {{ m.topic }}
    </a>
  </li>
  {% endfor %}
</ul>
