<div id="chat-log" class="flex-1 overflow-y-auto p-8 space-y-4">
  {% for message in messages %}
    {% include "workspace/_message.html" with context %}
  {% endfor %}
</div>
{% if active_manuscript %}
<form
  id="chat-form"
  hx-post="/api/chat/{{ active_manuscript.id }}/message"
  hx-target="#chat-log"
  hx-swap="beforeend"
  hx-indicator="#chat-spinner"
  hx-disabled-elt="find button, find textarea"
  hx-on::after-request="if(event.detail.successful) { this.reset(); const t = this.querySelector('textarea'); t.style.height = 'auto'; }"
  class="border-t border-[#e5e3df] p-5 flex gap-3 items-end bg-white"
>
  <textarea
    name="content" placeholder="메시지 입력…" required rows="1"
    class="flex-1 rounded-[8px] border border-[#c8c4be] px-4 py-3 text-base resize-none overflow-y-auto max-h-52 disabled:opacity-50 focus:outline-none focus:ring-2 focus:ring-[#d1d5db]"
    oninput="this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 160) + 'px'"
    onkeydown="if (event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); if (this.value.trim()) htmx.trigger(this.closest('form'), 'submit'); }"
  ></textarea>
  <span id="chat-spinner" class="htmx-indicator text-xs text-[#787671]">전송 중…</span>
  <button type="submit" class="rounded-[8px] bg-[#e5e7eb] text-[#1f1f1f] px-5 py-3 text-base disabled:opacity-50 hover:bg-[#d1d5db]">→</button>
</form>
<script>
(function () {
  const log = document.getElementById('chat-log');

  document.body.addEventListener('htmx:beforeRequest', (evt) => {
    const form = evt.detail.elt;
    if (!form || form.id !== 'chat-form') return;

    const textarea = form.querySelector('textarea[name="content"]');
    const content = textarea.value.trim();
    if (!content) return;

    const human = document.createElement('div');
    human.id = 'optimistic-human-message';
    human.className = 'message message-human flex justify-start';
    human.innerHTML = '<p class="bg-[#F6F5F4] rounded-[8px] px-4 py-3 text-base max-w-[88%] whitespace-pre-wrap leading-7"></p>';
    human.querySelector('p').textContent = content;
    log.appendChild(human);

    const pending = document.createElement('div');
    pending.id = 'optimistic-pending-ai';
    pending.className = 'message message-ai flex justify-end';
    pending.innerHTML = '<p class="bg-[#e5e7eb] text-[#1f1f1f] rounded-[8px] px-4 py-3 text-base max-w-[88%] flex items-center"><span class="w-3.5 h-3.5 border-2 border-[#1f1f1f] border-t-transparent rounded-full animate-spin"></span></p>';
    log.appendChild(pending);

    log.scrollTop = log.scrollHeight;

    textarea.value = '';
    textarea.style.height = 'auto';
  });

  document.body.addEventListener('htmx:beforeSwap', (evt) => {
    if (evt.detail.target !== log) return;
    document.getElementById('optimistic-human-message')?.remove();
    document.getElementById('optimistic-pending-ai')?.remove();
  });

  document.body.addEventListener('htmx:responseError', (evt) => {
    if (evt.detail.elt?.id !== 'chat-form') return;
    document.getElementById('optimistic-pending-ai')?.remove();
  });

  document.body.addEventListener('htmx:sendError', (evt) => {
    if (evt.detail.elt?.id !== 'chat-form') return;
    document.getElementById('optimistic-pending-ai')?.remove();
  });
})();
</script>
{% endif %}
