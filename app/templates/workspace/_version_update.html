{% if new_paper %}
<div id="version-list" hx-swap-oob="beforeend">
  {% set version_kind_labels = {"outline": "개요", "polish": "문서"} %}
  <div class="flex justify-between items-baseline py-1">
    <span class="text-lg">
      {{ version_kind_labels.get(new_paper.kind, "문서") }} {{ new_paper.revision }}
      <span class="text-sm text-[#787671]">({{ new_paper.created_at | kst_time }})</span>
    </span>
    <a href="/api/manuscripts/{{ manuscript_id }}/versions/{{ new_paper.version_id }}/download"
       class="text-[#4b5563] hover:underline">[다운로드]</a>
  </div>
</div>
{% endif %}
