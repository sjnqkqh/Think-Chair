{% if pending_version %}
<div id="version-list" hx-swap-oob="beforeend">
  {% set version_kind_labels = {"outline": "개요", "polish": "문서"} %}
  <div class="flex justify-between items-baseline py-1">
    <span class="text-lg">
      {{ version_kind_labels.get(pending_version.kind, "문서") }} {{ pending_version.revision }}
      <span class="text-sm text-[#787671]">({{ pending_version.created_at | kst_time }})</span>
    </span>
    <a href="/api/manuscripts/{{ manuscript_id }}/versions/{{ pending_version.version_id }}/download"
       class="text-[#4b5563] hover:underline">[다운로드]</a>
  </div>
</div>
{% endif %}
