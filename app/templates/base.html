<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Think Chair{% endblock %}</title>
  <link rel="icon" type="image/jpeg" href="/static/common/think_chair_icon.jpg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/json-enc.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background-color: #ffffff;
      color: #37352f;
    }
    .prose-writing { font-family: 'Noto Serif KR', serif; }
    ::selection { background-color: #bfdbfe; color: #111827; }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="min-h-screen">
  {% block content %}{% endblock %}
  <script>
    document.body.addEventListener('htmx:confirm', function (evt) {
      if (!evt.target.hasAttribute('hx-confirm')) return;
      evt.preventDefault();
      if (window.confirm(evt.detail.question)) {
        evt.detail.issueRequest(true);
      }
    });
  </script>
</body>
</html>
